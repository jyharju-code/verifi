# Verifi edge, port 80: ACME challenges and a redirect to HTTPS.
# The HTTPS server block lives in verifi-ssl.conf (from verifi-ssl.conf.example).

server {
    listen 80;
    listen [::]:80;
    server_name verifi.cloud _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://verifi.cloud$request_uri;
    }
}
