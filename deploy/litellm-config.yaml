# LiteLLM proxy: one endpoint (port 4000) for DeepSeek calls.
# Aliases stay stable for callers; adjust the upstream model ids here if
# DeepSeek publishes new slugs.
#
# The legacy deepseek-chat and deepseek-reasoner ids were retired by DeepSeek
# on 2026/07/24. Both mapped to deepseek-v4-flash, so deepseek-pro previously
# resolved to Flash in thinking mode rather than to Pro. It now points at
# deepseek-v4-pro, which is what the alias name has always implied.
model_list:
  - model_name: deepseek-flash
    litellm_params:
      model: deepseek/deepseek-v4-flash
      api_key: os.environ/DEEPSEEK_API_KEY
  - model_name: deepseek-pro
    litellm_params:
      model: deepseek/deepseek-v4-pro
      api_key: os.environ/DEEPSEEK_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  num_retries: 2
  request_timeout: 120
